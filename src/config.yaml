dataset:
  images_dir:  data/images
  masks_dir:   data/masks
  train_split: 0.8

# ── Semantic classes ────────────────────────────────────────────────────────
# 7 semantic classes + 1 background = 8 total labels for the model.
# Colors match the RGB values used in the mask PNG files (see utils.py).
classes:
  num_semantic: 7          # building, land/unpaved, road, vegetation, water, unlabeled, object
  ignore_index: 5          # "unlabeled" class is ignored during training
  color_map:
    0: [60,  16,  152]     # building      #3C1098
    1: [132, 41,  246]     # land/unpaved  #8429F6
    2: [110, 193, 228]     # road          #6EC1E4
    3: [254, 221,  58]     # vegetation    #FEDD3A
    4: [226, 169,  41]     # water         #E2A929
    5: [155, 155, 155]     # unlabeled     #9B9B9B  (ignored)
    6: [240, 190, 130]     # object        #F0BE82

model:
  # num_classes = num_semantic_classes + 1 (background)
  num_classes: 8
  pretrained:  true

training:
  epochs:          50
  batch_size:      2
  learning_rate:   0.005
  momentum:        0.9
  weight_decay:    0.0005
  lr_step_size:    20      # was 10 — decay less frequently
  lr_gamma:        0.5     # was 0.1 — decay less aggressively
  save_every:      5
  checkpoint_dir:  outputs/checkpoints

  # ── Fit diagnosis thresholds ──────────────────────────────────────────
  # gap  = train_loss - val_loss  (negative = val worse than train)
  # If |gap| < overfit_gap_threshold  AND  val_iou > good_iou_threshold → perfect fit
  # If gap < -overfit_gap_threshold                                      → overfitting
  # If val_iou < underfit_iou_threshold                                  → underfitting
  overfit_gap_threshold:   0.15   # loss gap that signals overfitting
  underfit_iou_threshold:  0.30   # mean IoU below this = underfitting
  good_iou_threshold:      0.45   # mean IoU above this + small gap = good fit

inference:
  score_threshold: 0.5
  results_dir:     outputs/results

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  log_file:  outputs/training_log.csv   # per-epoch CSV written during training
  plot_file: outputs/training_plot.png  # loss + IoU curves saved at end
