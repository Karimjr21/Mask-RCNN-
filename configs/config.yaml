dataset:
  # ── Raw iSAID data (huge images + original COCO annotations) ──────────────
  # Put the REAL RGB satellite images (P0000.png, P0001.png, ...) in raw_images_dir.
  # The *_instance_id_RGB.png / *_instance_color_RGB.png files are NOT the images.
  raw_images_dir: "data/images"
  raw_ann_file:   "data/annotations/iSAID_train.json"

  # ── Patched (tiled) data produced by src/prepare_isaid.py ────────────────
  images_dir: "data/patches/images"
  ann_file:   "data/patches/annotations.json"

  # ── Tiling ───────────────────────────────────────────────────────────────
  tile_size:    800
  tile_overlap: 200
  keep_empty_tiles: false      # write tiles with no instances too?

  # ── Instances / split ─────────────────────────────────────────────────────
  min_instance_area: 100       # drop instance fragments smaller than this (px)
  max_instances: 384           # cap instances per training tile (memory guard for dense tiles); val keeps all. Raised 256->384: dense small_vehicle tiles exceed 256 and randomly dropping GT teaches the model those objects are background (hurts recall). 16 GB T4 has the headroom.
  image_size: null             # tiles are already 800px; set an int to resize
  train_split: 0.8
  seed: 42
  split_indices_path: "outputs/splits/train_val_split.json"

# ── iSAID instance categories (15 foreground classes) ────────────────────────
# Model labels: 0 = background, 1..15 = iSAID category ids (used as-is).
classes:
  num_foreground: 15
  names:
    1:  storage_tank
    2:  large_vehicle
    3:  small_vehicle
    4:  plane
    5:  ship
    6:  swimming_pool
    7:  harbor
    8:  tennis_court
    9:  ground_track_field
    10: soccer_ball_field
    11: baseball_diamond
    12: bridge
    13: basketball_court
    14: roundabout
    15: helicopter

model:
  arch:        "v2"          # v1 = maskrcnn_resnet50_fpn; v2 = maskrcnn_resnet50_fpn_v2 (improved heads + recipe, several AP pts higher on COCO). NOTE: a v2 checkpoint is NOT loadable by a v1 model and vice versa — switching arch means a fresh run.
  backbone:    "resnet50"
  pretrained:  true
  num_classes: 16            # 15 foreground + 1 background
  trainable_backbone_layers: 4        # ResNet stages to fine-tune (0-5). 4 unfreezes everything except the generic conv1/bn1 stem; captures the COCO->aerial domain shift at far less memory than 5 (the stem's high-res activations are costly and its frozen BN stats help). 3 fits a 4 GB GPU.
  detections_per_img: 300             # iSAID tiles are dense; default 100 caps recall
  anchor_sizes: [16, 32, 64, 128, 256]  # smaller than COCO default for small aerial objects (one per FPN level)
  anchor_aspect_ratios: [0.33, 0.5, 1.0, 2.0, 3.0]  # add elongated ratios (0.33, 3.0) for ships/harbors/bridges/large_vehicles; >3 ratios rebuilds the RPN head to match (re-learned, converges fast)
  min_size: 800              # network input short side (tiles are 800px -> 1:1). Raise to 1000-1100 for better tiny-object recall, but cost scales ~(min_size/800)^2 in time+memory (1100 ~ 1.9x, likely needs batch_size 2). 800 keeps the run tractable on Kaggle.
  max_size: 1333             # network input long side cap

training:
  epochs:          35         # v2 + deeper fine-tune + new RPN head need a bit longer to converge than the v1 run (which plateaued ~epoch 12); early stopping trims it if it plateaus sooner.
  batch_size:        2        # v2 + 4 trainable layers + 5 anchor ratios OOMs at batch 4 on a 16 GB T4 (the RPN box_iou on dense tiles needs ~0.5 GB transient that doesn't fit beside batch-4 activations). batch 2 leaves comfortable headroom. If you have a >=24 GB GPU you can raise this and drop accumulation_steps to keep effective batch 8.
  accumulation_steps: 4       # batch 2 x 4 = effective batch 8 (unchanged) -> same LR schedule & quality
  learning_rate:     0.01     # scaled for effective batch 8; warmup+cosine schedule
  warmup_iters:      1500     # linear LR warmup (in optimizer steps) before cosine decay; longer warmup steadies the freshly-initialised heads (box, mask, and the rebuilt RPN head) + the newly-unfrozen backbone layer
  momentum:          0.9
  weight_decay:      0.0005
  gradient_clip_norm: 1.0     # clip grads; guards the larger LR early on
  checkpoint_dir:    "outputs/checkpoints"
  save_every:        2
  validation_interval:      2  # full detection validation every N epochs (epoch 1 & last always run); 1 = every epoch
  val_fraction:           0.25 # validate on this fraction of the val set (evenly-spaced, deterministic); 1.0 = full set
  validation_loss_interval: 5  # loss needs an extra validation forward; only on validation epochs
  keep_last_checkpoints: 3    # keep only the N newest model_epoch_*.pth (best/last always kept; 0 = keep all)
  amp:               false    # torchvision Mask R-CNN NaNs under fp16 autocast on this GPU; keep fp32
  early_stopping_patience:   12  # counts *validation events* without improvement (12 events = 24 epochs at interval 2)
  early_stopping_min_epochs: 20  # don't stop before epoch 20 — the deeper fine-tune + rebuilt RPN head improve later than the v1 run did
  early_stopping_min_delta:  0.001
  num_workers:     2          # overlaps the ~0.12s/tile decode+augment behind the ~0.42s GPU step; COCO loads lazily per worker (~0.5 GB each). Training is GPU-bound, so 2 is enough; the train + val loaders each hold this many workers, so raising it costs ~0.5 GB RAM per extra worker x2.
  pin_memory:      true
  persistent_workers: true    # keep workers (and their COCO index) alive across epochs
  prefetch_factor: 4          # tiles each worker buffers ahead of the GPU

  # ── Fit-diagnosis thresholds (mAP@50 based) ───────────────────────────────
  overfit_gap_threshold:   0.15
  underfit_iou_threshold:  0.20
  good_iou_threshold:      0.40

inference:
  score_threshold:     0.3
  nms_threshold:       0.3
  metric_iou_threshold: 0.5
  mask_threshold:      0.5
  results_dir:         "outputs/results"
  val_eval_fp16:       false  # DO NOT enable on this model: measured fast (~9x, 1.4 GB) but torchvision Mask R-CNN post-processing is not fp16-safe in eval -> masks go degenerate and mAP collapses to 0.0. Kept as an off-by-default lever only.

logging:
  log_file:          "outputs/training_log.csv"
  plot_file:         "outputs/training_plot.png"
  val_preview_dir:   "outputs/validation_previews"
  val_preview_count: 5
